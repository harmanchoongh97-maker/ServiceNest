<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

/* LIGHT GREY BACKGROUND */
body{
  background:#f2f2f2;
  color:#333;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGOUT BUTTON TOP RIGHT */
.settings{
  position:absolute;
  top:20px;
  right:20px;
}

.settings button{
  padding:10px 22px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff4d4d,#ff0066);
  color:white;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.settings button:hover{
  transform:scale(1.08);
}

/* DASHBOARD CARD */
.dashboard-box{
  background:white;
  padding:60px 40px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
  text-align:center;
}

.dashboard-box h1{
  font-size:36px;
  color:#ff9800;
}

.dashboard-box p{
  margin-top:15px;
  color:#666;
  font-size:16px;
}

</style>

</head>

<body>

<div class="settings">
  <button onclick="logout()">Logout</button>
</div>

<div class="dashboard-box">
  <h1>🎉 Welcome to Dashboard 😎</h1>
  <p>You have successfully logged in.</p>
</div>

<script>
function logout(){
  alert("Logged out ✅");

  // Redirect to login page
  window.location.href = "tssstst.html";
}
</script>

</body>
</html>
