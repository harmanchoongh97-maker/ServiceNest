<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap');

:root {
  --bg-primary: #f0f4ff;
  --bg-secondary: #e8eeff;
  --card-bg: rgba(255, 255, 255, 0.75);
  --card-border: rgba(180, 195, 255, 0.5);
  --input-bg: rgba(240, 244, 255, 0.9);
  --input-border: rgba(150, 170, 255, 0.4);
  --input-focus: rgba(100, 120, 255, 0.25);
  --text-primary: #1a1f4e;
  --text-secondary: #5a6080;
  --text-muted: #8a90b0;
  --accent-1: #6366f1;
  --accent-2: #a78bfa;
  --accent-3: #60a5fa;
  --shadow: 0 20px 60px rgba(100, 110, 200, 0.15);
  --shadow-btn: 0 8px 24px rgba(99, 102, 241, 0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: var(--bg-primary);
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(167, 139, 250, 0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(96, 165, 250, 0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 60% 10%, rgba(99, 102, 241, 0.12) 0%, transparent 45%);
  color: var(--text-primary);
  padding: 20px;
}

/* Floating decorative blobs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 400px; height: 400px;
  background: rgba(167, 139, 250, 0.12);
  top: -100px; left: -100px;
  animation: float1 8s ease-in-out infinite;
}
body::after {
  width: 350px; height: 350px;
  background: rgba(96, 165, 250, 0.12);
  bottom: -80px; right: -80px;
  animation: float2 10s ease-in-out infinite;
}

@keyframes float1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(30px, 20px); }
}
@keyframes float2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-20px, -30px); }
}

.login-wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
  animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Decorative top accent */
.accent-bar {
  height: 4px;
  background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
  border-radius: 4px 4px 0 0;
}

.signup-box {
  background: var(--card-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--card-border);
  border-top: none;
  border-radius: 0 0 24px 24px;
  padding: 40px 40px 36px;
  box-shadow: var(--shadow);
  text-align: center;
}

.brand-icon {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
}

.brand-icon svg {
  width: 26px; height: 26px;
  fill: white;
}

h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}

.subtitle {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 30px;
}

.input-group {
  margin-bottom: 18px;
  text-align: left;
}

.input-group label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 7px;
  letter-spacing: 0.2px;
}

.input-wrapper {
  position: relative;
}

.input-wrapper svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 17px; height: 17px;
  fill: none;
  stroke: var(--text-muted);
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: none;
  transition: stroke 0.2s;
}

.input-group input {
  width: 100%;
  padding: 12px 14px 12px 42px;
  border: 1.5px solid var(--input-border);
  border-radius: 12px;
  background: var(--input-bg);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 14.5px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}

.input-group input::placeholder {
  color: var(--text-muted);
}

.input-group input:focus {
  border-color: var(--accent-1);
  background: white;
  box-shadow: 0 0 0 4px var(--input-focus);
}

.input-group input:focus + svg,
.input-wrapper:focus-within svg {
  stroke: var(--accent-1);
}

/* Fix icon z-index so it stays above input */
.input-wrapper {
  display: flex;
  flex-direction: column;
}
.input-wrapper input { order: 1; }
.input-wrapper svg { order: 2; z-index: 2; }

.forgot {
  display: block;
  text-align: right;
  font-size: 13px;
  color: var(--accent-1);
  text-decoration: none;
  margin-top: -10px;
  margin-bottom: 24px;
  opacity: 0.85;
  transition: opacity 0.2s;
}
.forgot:hover { opacity: 1; }

.signup-btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 15.5px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.3px;
  box-shadow: var(--shadow-btn);
  transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
}

.signup-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(99, 102, 241, 0.4);
  filter: brightness(1.05);
}

.signup-btn:active {
  transform: translateY(0);
  box-shadow: var(--shadow-btn);
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 22px 0 20px;
}
.divider span {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(150, 170, 255, 0.3);
}

.extra {
  font-size: 14px;
  color: var(--text-muted);
}

.extra a {
  color: var(--accent-1);
  text-decoration: none;
  font-weight: 500;
  transition: opacity 0.2s;
}
.extra a:hover { opacity: 0.75; }
</style>
</head>

<body>

<div class="login-wrapper">
  <div class="accent-bar"></div>
  <div class="signup-box">

    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 3a3 3 0 110 6 3 3 0 010-6zm0 14.2a7.2 7.2 0 01-6-3.22c.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08a7.2 7.2 0 01-6 3.22z"/>
      </svg>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to continue to your account</p>

    <form id="loginForm">

      <div class="input-group">
        <label>Email address</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="you@example.com" required>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="••••••••" required>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
      </div>

      <a href="#" class="forgot">Forgot password?</a>

      <button type="submit" class="signup-btn">Sign In</button>

    </form>

    <div class="divider"><span>or</span></div>

    <div class="extra">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>

  </div>
</div>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDiRWKR6WjLZeyAl8dhp94mRoz66lgL5es",
  authDomain: "service-nest-new.firebaseapp.com",
  projectId: "service-nest-new",
  storageBucket: "service-nest-new.appspot.com",
  messagingSenderId: "264693794866",
  appId: "1:264693794866:web:06a092ba716a4d4127142b"
};

// ✅ safe init (reload error avoid)
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();

// 🔐 LOGIN
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  console.log("Login clicked");

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
      console.log(userCredential.user);
      alert("Login successful ✅");

      window.location.href = "index3.html";
    })
    .catch((error) => {
      console.error(error);
      alert(error.message);
    });
});
</script>



</body>
</html>
