<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background-image: url('back.jpg');
    background-position: center;
    background-attachment: fixed;
    color:white;
}

.signup-box {
    width: 340px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
    text-align: center;
}

.input-group {
    margin-bottom: 18px;
    text-align: left;
}

.input-group label {
    font-size: 14px;
    opacity: 0.8;
}

.input-group input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
}

.signup-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #00f2ff, #ff00cc);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.extra {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.8;
}

.extra a {
    color: #00f2ff;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="signup-box">
<h2>Login</h2>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<button type="submit" class="signup-btn">Login</button>

</form>

<div class="extra">
    Don’t have an account? <a href="signup.html">Sign Up</a>
</div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC2QswyNd4oN6xKYjchR2Web2q74LU1QdQ",
  authDomain: "service-nest-c07bb.firebaseapp.com",
  databaseURL: "https://service-nest-c07bb-default-rtdb.firebaseio.com",
  projectId: "service-nest-c07bb",
  storageBucket: "service-nest-c07bb.firebasestorage.app",
  messagingSenderId: "854846938802",
  appId: "1:854846938802:web:f024d58c5147014d07b3ab"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  database.ref("users").once("value")
    .then(function(snapshot){

      let found = false;

      snapshot.forEach(function(child){
        const data = child.val();

        if(data.email === email && data.password === password){
          found = true;
        }
      });

      if(found){
        alert("Login successful ✅");
        window.location.href = "dashboard.html";
      }else{
        alert("Invalid email or password ❌");
      }

    });
});
</script>

</body>
</html>
