<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Services</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}


header{
    position:fixed;
    width:100%;
    height:70px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 60px;
    z-index:1000;
}

.logo{
    font-size:22px;
    font-weight:700;
    color:#ffcc70;
}

nav a{
    color:white;
    margin-left:30px;
    text-decoration:none;
    position:relative;
    transition:0.3s;
}

nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:#ff9800;
    transition:0.3s;
}

nav a:hover{
    color:#ff9800;
}

nav a:hover::after{
    width:100%;
}

.hero{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
    padding:20px;
    padding-top: 90px;
}

.hero h1{
    font-size:55px;
    color:#ffcc70;
}

.hero p{
    margin-top:15px;
    color:#ddd;
    max-width:600px;
}

.hero button{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background: linear-gradient(45deg,#00f2ff,#ff00cc);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.hero button:hover{
    transform:scale(1.1);
}

@media(max-width:768px){

    header{
        flex-direction:column;
        height:auto;
        padding:15px;
    }

    nav{
        margin-top:10px;
    }

    .hero h1{
        font-size:35px;
    }

}

</style>
</head>

<body>

<header>
    <div class="logo">ServiceNest</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Hire Skilled Workers Easily</h1>
    <p>Book trusted carpenters, plumbers, electricians and more with live location tracking and fast service.</p>
    <button onclick="window.location.href='mtrade.html'">Get Started</button>

</body>
</html>
