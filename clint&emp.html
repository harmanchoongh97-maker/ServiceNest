<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Services</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}
 body{
     background-image:url('back.jpg');
     background-position: center;  
     background-attachment: fixed;
}

body::before,
body::after{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(60px);
    z-index:-1;
    animation: float 6s infinite alternate;
}




header{
    position:fixed;
    top:0;
    width:100%;
    height:75px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 50px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
    font-size:27px;
    font-weight:700;
    color:#ffcc80;
}


.employee-section{
    margin-top:120px;
    padding:60px 20px;
    text-align:center;
    
}

.employee-section h1{
    font-size:42px;
    margin-bottom:10px;
    color:#ffcc80;
}

.employee-section p{
    margin-bottom:40px;
    color:#ddd;
}


.employee-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
}

.employee-box{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.15);
    width:280px;
    padding:30px 22px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.4s;
    position:relative;
    overflow:hidden;
    text-align:left;
}

.employee-box:hover{
    transform:translateY(-12px);
    box-shadow:0 18px 45px rgba(0,0,0,0.6);
}

.employee-box h2{
    margin-bottom:10px;
    color:#e9d372;
}

.employee-box p{
    font-size:14px;
    margin-bottom:20px;
    line-height:1.6;
}


.employee-box button{
    padding:10px 20px;
    border:none;
   background: linear-gradient(45deg, #00f2ff, #ff00cc);    
    color:white;
    border-radius:30px;
    cursor:pointer;
    font-weight:600;
    position:relative;
    overflow:hidden;
 }
.employee-box button:hover{
    transform:scale(1.1);
}

.employee-box button::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.3);
    transition:0.4s;
}

.employee-box button:hover::after{
    left:100%;
}

/* Responsive */
    header{
        flex-direction:column;
        height:auto;
        padding:15px;
    }

    

    .employee-section h1{
        font-size:34px;
    }

</style>
</head>

<body>

<header>
    <div class="logo">Service Nest</div>

    
</header>

<section class="employee-section">
    <h1>Select Your Category</h1>

    <div class="employee-container">

        <div class="employee-box">
            <h2>Employee</h2>
           
            <button onclick="window.location.href='cline side.html'">book Now</button>
        </div>

        <div class="employee-box">
            <h2>Client</h2>
            
            <button onclick="window.location.href='signuppp.html'">book Now</button>
        </div>

   

</section>
</body>
</html>
