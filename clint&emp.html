<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Services</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* LIGHT GREY BACKGROUND */
body{
     background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    width:100%;
    height:75px;
    display:flex;
    justify-content:center;
    align-items:center;
     background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
}

.logo{
    font-size:27px;
    font-weight:700;
    color:#ff9800;
}

/* SECTION */
.employee-section{
    margin-top:120px;
    padding:60px 20px;
    text-align:center;
}

.employee-section h1{
    font-size:42px;
    margin-bottom:10px;
    color:#ff9800;
}

.employee-section p{
    margin-bottom:40px;
    color:#666;
}

/* CONTAINER */
.employee-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
}

/* BOX STYLE */
.employee-box{
    background:white;
    border:1px solid #ddd;
    width:280px;
    padding:30px 22px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
    transition:0.3s;
    text-align:center;
}

.employee-box:hover{
    transform:translateY(-10px);
    box-shadow:0 18px 40px rgba(0,0,0,0.18);
}

.employee-box h2{
    margin-bottom:20px;
    color:#333;
}

/* BUTTON */
.employee-box button{
    padding:12px 25px;
    border:none;
    background: linear-gradient(45deg, #00bcd4, #ff00cc);
    color:white;
    border-radius:30px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.employee-box button:hover{
    transform:scale(1.08);
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){

    header{
        height:auto;
        padding:15px;
    }

    .employee-section h1{
        font-size:32px;
    }

    .employee-box{
        width:90%;
    }
}

</style>
</head>

<body>

<header>
    <div class="logo">Service Nest</div>
</header>

<section class="employee-section">

    <h1>Select Your Category</h1>

    <div class="employee-container">

        <div class="employee-box">
            <h2>Employee</h2>
            <button onclick="window.location.href='cline side.html'">
                Book Now
            </button>
        </div>

        <div class="employee-box">
            <h2>Client</h2>
            <button onclick="window.location.href='signuppp.html'">
                Book Now
            </button>
        </div>

    </div>

</section>

</body>
</html>
