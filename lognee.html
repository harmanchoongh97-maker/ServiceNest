<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .login-box{
        background:white;
        padding:40px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        width:320px;
        text-align:center;
    }

    .login-box h2{
        margin-bottom:20px;
        color:#333;
    }

    .input-box{
        margin:15px 0;
        text-align:left;
    }

    .input-box label{
        font-size:14px;
        color:#555;
    }

    .input-box input{
        width:100%;
        padding:10px;
        margin-top:5px;
        border:1px solid #ccc;
        border-radius:8px;
        outline:none;
        transition:0.3s;
    }

    .input-box input:focus{
        border-color:#4facfe;
    }

    .login-btn{
        width:100%;
        padding:12px;
        margin-top:20px;
        border:none;
        border-radius:8px;
        background:#b1c9df;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .login-btn:hover{
        background:#b3c6db;
    }

    .extra{
        margin-top:15px;
        font-size:14px;
    }

    .extra a{
        text-decoration:none;
        color:#4facfe;
    }
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form>
        <div class="input-box">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <button class="login-btn">Login</button>
    </form>

    <div class="extra">
        <p>Don't have an account? <a href="#">Register</a></p>
    </div>
</div>

</body>
</html>
